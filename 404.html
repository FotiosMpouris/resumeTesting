<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Signal Lost · Fotios Mpouris</title>
  <meta name="robots" content="noindex" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      background: #000;
      color: #00ff41;
      font-family: 'Courier New', Consolas, monospace;
      height: 100%;
      overflow: hidden;
    }
    #rain {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      z-index: 0;
    }
    .panel {
      position: relative;
      z-index: 1;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
      pointer-events: none;
    }
    .panel > * { pointer-events: auto; }
    h1 {
      font-size: clamp(3.5rem, 14vw, 8rem);
      letter-spacing: 0.3em;
      text-shadow: 0 0 20px #00ff41, 0 0 40px rgba(0, 255, 65, 0.4);
      margin-bottom: 8px;
      animation: glitch 6s infinite;
    }
    .signal {
      font-size: 0.85rem;
      letter-spacing: 0.4em;
      opacity: 0.7;
      margin-bottom: 28px;
    }
    .links { display: flex; gap: 24px; flex-wrap: wrap; justify-content: center; font-size: 0.95rem; }
    .links a {
      color: #00ff41;
      text-decoration: none;
      border: 1px solid rgba(0, 255, 65, 0.45);
      padding: 8px 18px;
      letter-spacing: 0.15em;
      transition: all 0.2s ease;
      background: rgba(0, 0, 0, 0.4);
    }
    .links a:hover {
      background: rgba(0, 255, 65, 0.12);
      box-shadow: 0 0 16px rgba(0, 255, 65, 0.5);
    }
    .meta {
      position: fixed;
      bottom: 14px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.7rem;
      letter-spacing: 0.3em;
      opacity: 0.5;
      z-index: 1;
    }
    @keyframes glitch {
      0%, 92%, 100% { text-shadow: 0 0 20px #00ff41, 0 0 40px rgba(0, 255, 65, 0.4); transform: translate(0, 0); }
      93% { text-shadow: 2px 0 #ff00ff, -2px 0 #00ffff; transform: translate(2px, -1px); }
      94% { text-shadow: -2px 0 #ff00ff, 2px 0 #00ffff; transform: translate(-2px, 1px); }
      95% { text-shadow: 0 0 20px #00ff41; transform: translate(0, 0); }
    }
  </style>
</head>
<body>
  <canvas id="rain"></canvas>
  <div class="panel">
    <h1>404</h1>
    <div class="signal">// SIGNAL LOST</div>
    <div class="links">
      <a href="/">Return to Source</a>
      <a href="/ai-apps.html">AI Apps</a>
      <a href="/websites.html">Websites</a>
      <a href="https://matrix.fotiosmpouris.com">The Studio</a>
    </div>
  </div>
  <div class="meta">&gt; The page you wanted does not exist in this construct.</div>

  <script>
    (function () {
      const canvas = document.getElementById('rain');
      const ctx = canvas.getContext('2d');
      let cols, drops;
      const fontSize = 18;
      const chars = 'アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン0123456789ABCDEF<>/{}[]';

      function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        cols = Math.floor(canvas.width / fontSize);
        drops = new Array(cols).fill(0).map(() => Math.random() * canvas.height / fontSize);
      }
      resize();
      window.addEventListener('resize', resize);

      function draw() {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.06)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.font = fontSize + 'px monospace';
        for (let i = 0; i < drops.length; i++) {
          const ch = chars[Math.floor(Math.random() * chars.length)];
          const y = drops[i] * fontSize;
          ctx.fillStyle = (Math.random() > 0.97) ? '#ffffff' : '#00ff41';
          ctx.fillText(ch, i * fontSize, y);
          if (y > canvas.height && Math.random() > 0.975) drops[i] = 0;
          drops[i]++;
        }
      }
      setInterval(draw, 50);
    })();
  </script>
</body>
</html>
